name: NOC Docs Check

on:
  pull_request:

jobs:
  noc-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install NOC CLI
        run: python -m pip install -e .
      - name: Stage PR diff against base
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git reset --mixed "origin/${{ github.base_ref }}"
          git add -A
      - name: Check NOC docs coverage
        run: noc check . --staged --environment ci --github-annotations
