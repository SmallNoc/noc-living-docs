name: Validate

on:
  push:
    tags:
      - "v*"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m py_compile scripts/__init__.py scripts/noc.py scripts/init-noc-docs.py scripts/index-noc-docs.py scripts/release.py scripts/validate-noc-docs.py
      - run: python -m pip install -e .
      - run: noc --help
      - run: python scripts/release.py --check
      - run: python scripts/validate-noc-docs.py
      - run: python scripts/validate-noc-docs.py --target examples/small-project
      - run: python scripts/validate-noc-docs.py --target examples/domain-project
      - run: python scripts/noc.py validate
      - run: python scripts/noc.py validate --target examples/small-project
      - run: python scripts/noc.py validate --target examples/domain-project
      - run: python -m unittest tests.test_noc_cli tests.test_release_cli tests.test_setup_cli
